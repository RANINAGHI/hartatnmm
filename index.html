        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

                this._div.innerHTML = 'Prezentul proiect detaliază realizarea unei aplicații WebGIS interactive destinate vizualizării și analizei spațiale a elementelor geografice, topografice și de infrastructură din regiunea Transilvania-Nord + Maramureș. Obiectivul principal a fost integrarea datelor de relief cu rețeaua de așezări umane și infrastructura de transport într-o platformă web dinamică, rapidă și ușor de utilizat.<br />Prelucrarea, filtrarea și stilizarea datelor s-au realizat în mediul desktop open-source QGIS. Baza de date spațială include date de tip raster (Modelul Digital de Elevație și Hillshade, optimizate sub formă de imagini randate pentru a asigura fluiditatea pe web) și date vectoriale clasificate ierarhic. Elementele vectoriale cuprind rețeaua hidrografică, relieful major (vârfuri, pasuri montane, depresiuni), stații meteo, rețeaua rutieră (autostrăzi și drumuri naționale) și localitățile. Pentru o lizibilitate cartografică optimă, așezările umane au fost împărțite pe patru praguri demografice (sub 1.000, 1.000 - 5.000, 5.000 - 50.000 și peste 50.000 de locuitori).<br />Conversia proiectului din mediul desktop în aplicație web s-a realizat prin intermediul plugin-ului qgis2web. O atenție deosebită a fost acordată optimizării performanței (eliminarea lag-ului de randare la nivelul browserului).<br />Rezultatul final, găzduit pe platforma Netlify, este o hartă digitală complet interactivă. Utilizatorul poate activa și dezactiva straturi de interes, poate interoga atributele spațiale prin intermediul ferestrelor pop-up și poate oferi sugestii printr-un modul de feedback integrat direct în interfață. Proiectul demonstrează eficiența și utilitatea tehnologiilor WebGIS moderne în cartografierea și comunicarea datelor geografice complexe către publicul larg.';
